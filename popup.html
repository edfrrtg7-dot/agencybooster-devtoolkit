<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgencyBooster Diagnostics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 420px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #c9d1d9;
      font-size: 13px;
      line-height: 1.5;
    }
    .header { padding: 14px 16px; background: #161b22; border-bottom: 1px solid #30363d; }
    .header h1 { font-size: 14px; font-weight: 600; color: #f0f6fc; margin: 0; }
    .header .sub { font-size: 11px; color: #8b949e; margin-top: 2px; }
    .section { padding: 12px 16px; border-bottom: 1px solid #21262d; }
    .section:last-child { border-bottom: none; }
    .section-title {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: #8b949e; margin-bottom: 8px;
    }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .stat-box {
      background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 8px 10px;
    }
    .stat-box .label { font-size: 10px; color: #8b949e; margin-bottom: 2px; }
    .stat-box .value { font-size: 16px; font-weight: 600; color: #58a6ff; }
    .stat-box .value.sm { font-size: 12px; color: #c9d1d9; font-weight: 400; }
    .explorer-card {
      background: #161b22; border: 1px solid #21262d; border-radius: 6px;
      padding: 8px 10px; margin-bottom: 4px;
    }
    .explorer-card:last-child { margin-bottom: 0; }
    .explorer-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .health-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .health-dot.healthy { background: #3fb950; }
    .health-dot.idle { background: #d29922; }
    .health-dot.silent { background: #8b949e; }
    .health-dot.error { background: #f85149; }
    .explorer-name { font-weight: 600; font-size: 12px; color: #f0f6fc; }
    .explorer-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 12px; font-size: 11px; }
    .explorer-meta .k { color: #8b949e; }
    .explorer-meta .v { color: #c9d1d9; text-align: right; font-variant-numeric: tabular-nums; }
    .explorer-meta .v.running { color: #3fb950; }
    .explorer-meta .v.stopped { color: #f85149; }
    .explorer-meta .v.rate { color: #58a6ff; font-weight: 600; }
    .recorder-item { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; }
    .recorder-item .k { color: #c9d1d9; }
    .recorder-item .v { font-variant-numeric: tabular-nums; }
    .recorder-item .v.ok { color: #3fb950; }
    .recorder-item .v.err { color: #f85149; }
    .btn-group { display: flex; gap: 6px; }
    .btn {
      flex: 1; padding: 7px 10px; font-size: 11px; font-weight: 500;
      border: 1px solid #30363d; border-radius: 6px; background: #21262d;
      color: #c9d1d9; cursor: pointer; text-align: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: #30363d; border-color: #8b949e; }
    .btn:active { background: #161b22; }
    .toast {
      position: fixed; bottom: 12px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      padding: 6px 14px; font-size: 11px; font-weight: 500;
      color: #f0f6fc; background: #238636; border-radius: 6px;
      opacity: 0; transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; white-space: nowrap; z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .unavail { color: #484f58; font-style: italic; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>AgencyBooster Toolkit</h1>
    <div class="sub">Diagnostics</div>
  </div>

  <div class="section">
    <div class="section-title">Explorers</div>
    <div id="explorers"><div class="unavail">Waiting for content script...</div></div>
  </div>

  <div class="section">
    <div class="section-title">Observations</div>
    <div class="grid" id="obs-grid">
      <div class="stat-box"><div class="label">Total</div><div class="value" id="obs-total">--</div></div>
      <div class="stat-box"><div class="label">Current Rate</div><div class="value" id="obs-rate">--</div></div>
      <div class="stat-box"><div class="label">Most Active</div><div class="value sm" id="obs-active">--</div></div>
      <div class="stat-box"><div class="label">Last Observation</div><div class="value sm" id="obs-last">--</div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Recorder</div>
    <div id="recorder"><div class="unavail">Waiting for content script...</div></div>
  </div>

  <div class="section">
    <div class="section-title">Runtime</div>
    <div class="grid" id="runtime-grid">
      <div class="stat-box"><div class="label">Session</div><div class="value sm" id="rt-session">--</div></div>
      <div class="stat-box"><div class="label">Visibility</div><div class="value sm" id="rt-visibility">--</div></div>
      <div class="stat-box"><div class="label">Memory</div><div class="value sm" id="rt-memory">--</div></div>
      <div class="stat-box"><div class="label">Diagnostics Updated</div><div class="value sm" id="rt-updated">--</div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Developer Tools</div>
    <div class="btn-group">
      <button class="btn" id="btn-copy-diag">Copy Diagnostics</button>
      <button class="btn" id="btn-copy-obs">Copy Recent Observations</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="dist/popup.js" type="module"></script>
</body>
</html>
