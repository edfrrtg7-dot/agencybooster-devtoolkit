<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgencyBooster Diagnostics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #c9d1d9;
      font-size: 13px;
      line-height: 1.5;
      padding: 0;
    }
    .header {
      padding: 14px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }
    .header h1 { font-size: 14px; font-weight: 600; color: #f0f6fc; margin: 0; }
    .header .subtitle { font-size: 11px; color: #8b949e; margin-top: 2px; }
    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #21262d;
    }
    .section:last-child { border-bottom: none; }
    .section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8b949e;
      margin-bottom: 8px;
    }
    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 12px;
    }
    .item-label { color: #c9d1d9; }
    .item-value { color: #8b949e; font-variant-numeric: tabular-nums; }
    .item-value.running { color: #3fb950; }
    .item-value.stopped { color: #f85149; }
    .item-value.ok { color: #3fb950; }
    .item-value.unavail { color: #484f58; font-style: italic; }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      font-size: 12px;
    }
    .stat-label { color: #c9d1d9; }
    .stat-value { color: #58a6ff; font-weight: 600; font-variant-numeric: tabular-nums; }
    .stat-row.total { padding-bottom: 6px; margin-bottom: 4px; border-bottom: 1px solid #21262d; }
    .stat-row.total .stat-label { font-weight: 600; color: #f0f6fc; }
    .stat-row.total .stat-value { font-size: 18px; color: #58a6ff; }
    .btn-group { display: flex; gap: 6px; }
    .btn {
      flex: 1;
      padding: 7px 10px;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #21262d;
      color: #c9d1d9;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: #30363d; border-color: #8b949e; }
    .btn:active { background: #161b22; }
    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 500;
      color: #f0f6fc;
      background: #238636;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="header">
    <h1>AgencyBooster Toolkit</h1>
    <div class="subtitle">Diagnostics</div>
  </div>

  <div class="section">
    <div class="section-title">Explorer Status</div>
    <div id="explorers"><div class="item"><span class="item-value unavail">Waiting for content script...</span></div></div>
  </div>

  <div class="section">
    <div class="section-title">Observation Statistics</div>
    <div id="observations"><div class="item"><span class="item-value unavail">Waiting for content script...</span></div></div>
  </div>

  <div class="section">
    <div class="section-title">Recorder Status</div>
    <div id="recorder"><div class="item"><span class="item-value unavail">Waiting for content script...</span></div></div>
  </div>

  <div class="section">
    <div class="section-title">Runtime Information</div>
    <div id="runtime"><div class="item"><span class="item-value unavail">Loading...</span></div></div>
  </div>

  <div class="section">
    <div class="section-title">Developer Tools</div>
    <div class="btn-group">
      <button class="btn" id="btn-copy-diag">Copy Diagnostics</button>
      <button class="btn" id="btn-copy-obs">Copy Recent Observations</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="dist/popup.js" type="module"></script>
</body>
</html>
