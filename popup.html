<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AgencyBooster Developer Toolkit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 { font-size: 14px; color: #00d4ff; margin-bottom: 12px; }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #2a2a3e;
      font-size: 12px;
    }
    .row:last-child { border-bottom: none; }
    .label { color: #999; }
    .connected { color: #4caf50; }
    .disconnected { color: #f44336; }
  </style>
</head>
<body>
  <h1>AgencyBooster Toolkit</h1>
  <div class="row">
    <span class="label">Background</span>
    <span id="bg-status" class="disconnected">waiting...</span>
  </div>
  <div class="row">
    <span class="label">Content Script</span>
    <span id="content-status" class="disconnected">waiting...</span>
  </div>
  <script src="dist/popup.js" type="module"></script>
</body>
</html>
